name: Docker push containers to dockerhub

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

permissions: {}

jobs:
  docker-push-production:
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      attestations: write
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get repository name
        id: repo-basename
        run: |
          echo "repo=$(basename ${{ github.repository }})" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build docker image and push to DockerHub
        uses: senzing-factory/github-action-docker-buildx-build@v2
        with:
          image-repository: senzing/${{ steps.repo-basename.outputs.repo }}
          image-tag: ${{ github.ref_name }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
          push: true
          sign-image: true
          username: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Notify Slack on failure
        if: failure() || cancelled()
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}

  docker-push-staging:
    if: github.ref == 'refs/heads/main'
    permissions:
      attestations: write
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get repository name
        id: repo-basename
        run: |
          echo "repo=$(basename ${{ github.repository }})" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build staging docker image and push to DockerHub
        uses: senzing-factory/github-action-docker-buildx-build@v2
        with:
          build-options: |
            SENZING_APT_REPOSITORY_NAME=${{ vars.SENZING_APT_STAGING_REPOSITORY_PACKAGE }}
            SENZING_APT_REPOSITORY_URL=${{ vars.SENZING_APT_STAGING_REPOSITORY_URL }}
          image-repository: senzing/${{ steps.repo-basename.outputs.repo }}
          image-tag: staging
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
          push: true
          sign-image: true
          skip-latest-tag: true
          username: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Notify Slack on failure
        if: failure() || cancelled()
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
